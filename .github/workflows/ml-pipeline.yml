# Entraînement ML — uniquement via l’image Docker `ci`
name: ML pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 1"
  push:
    branches: [main, jihed]
    paths:
      - "Makefile"
      - "scripts/train_models.py"
      - "scripts/mlflow_integration.py"
      - "tests/fixtures/ci_train.csv"
      - ".github/workflows/ml-pipeline.yml"
      - "Dockerfile.ci"
      - "requirements.txt"

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Resolve MLflow target
        env:
          REMOTE_MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: |
          set -e
          if [ -n "$REMOTE_MLFLOW_TRACKING_URI" ]; then
            echo "EFFECTIVE_MLFLOW_TRACKING_URI=$REMOTE_MLFLOW_TRACKING_URI" >> "$GITHUB_ENV"
            echo "USE_LOCAL_MLFLOW=false" >> "$GITHUB_ENV"
            echo "Using remote MLflow tracking URI from secret."
          else
            echo "EFFECTIVE_MLFLOW_TRACKING_URI=http://mlflow:5000" >> "$GITHUB_ENV"
            echo "USE_LOCAL_MLFLOW=true" >> "$GITHUB_ENV"
            echo "No MLFLOW_TRACKING_URI secret set; using local compose MLflow for this job."
          fi

      - name: Start MLflow
        run: |
          if [ "$USE_LOCAL_MLFLOW" = "true" ]; then
            docker compose up -d mlflow
          else
            echo "Skipping local MLflow; remote tracking URI is configured."
          fi

      - name: Wait for MLflow
        run: |
          set -e
          if [ "$USE_LOCAL_MLFLOW" != "true" ]; then
            echo "Remote MLflow configured; skipping local readiness check."
            exit 0
          fi
          for i in $(seq 1 90); do
            if curl -sf http://127.0.0.1:5006/ >/dev/null; then
              echo "MLflow is up."
              exit 0
            fi
            echo "Waiting for MLflow ($i/90)..."
            sleep 2
          done
          docker compose logs mlflow --tail 80
          exit 1

      - name: Run training (MLflow + données CI)
        run: |
          docker compose --profile ci run --rm --no-deps \
            -e MLFLOW_TRACKING_URI="$EFFECTIVE_MLFLOW_TRACKING_URI" \
            -e DISABLE_ELASTICSEARCH_PUSH=1 \
            -e TRAIN_DATA_PATH=tests/fixtures/ci_train.csv \
            ci python scripts/train_models.py

      - name: Verify MLflow registry
        run: |
          docker compose --profile ci run --rm --no-deps \
            -e MLFLOW_TRACKING_URI="$EFFECTIVE_MLFLOW_TRACKING_URI" \
            ci python scripts/version_models.py mlflow-registry

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ml-outputs
          path: |
            ml/metadata.json
            ml/mlflow_last_run.json
            ml/mlflow.db
            ml/mlartifacts/**
            ml/*.pkl
          if-no-files-found: warn
