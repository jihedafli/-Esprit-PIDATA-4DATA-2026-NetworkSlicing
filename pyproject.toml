[tool.ruff]
line-length = 100
exclude = ["ml", ".venv", "__pycache__", ".git"]

[tool.ruff.lint]
# Keep checks useful but light so the existing codebase stays green.
ignore = [
    "E501",
    "F401",
    "F841",
    "E722",
    "F541",
    "F811",
    "E402",
    "E731",
]

[tool.black]
line-length = 100
target-version = ["py310"]
extend-exclude = "/(ml|\\.venv|venv)/"

[tool.pytest.ini_options]
testpaths = ["tests/unit"]
python_files = ["test_*.py"]
pythonpath = ["."]
